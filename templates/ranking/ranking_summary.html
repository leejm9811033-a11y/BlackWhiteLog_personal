<div class="activity-summary-link" id="activitySummaryBtn" style="cursor: pointer;">
    <section class="activity-summary-card">
        <div class="activity-summary-top">
            <strong class="activity-summary-title">내 활동 현황</strong>
            <div class="activity-summary-progress">
                <div class="activity-summary-progress-bar">
                    <div class="activity-summary-progress-fill" id="summaryGaugeFill" style="width: 0%;"></div>
                </div>
                <span class="activity-summary-progress-text">68%</span>
            </div>
        </div>

        <div class="activity-summary-stats">
            <div class="activity-summary-stat">
                <span class="activity-summary-label">방문 도장</span>
                <strong class="activity-summary-value" id="summaryVisitCount">-</strong>
            </div>

            <div class="activity-summary-stat">
                <span class="activity-summary-label">내 랭킹</span>
                <strong class="activity-summary-value" id="summaryMyRank">-</strong>
            </div>

            <div class="activity-summary-stat">
                <span class="activity-summary-label">최근 획득 배지</span>
                <div class="activity-summary-badge" id="summaryLatestBadge" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f0f0f0;">
                    <span style="font-size: 10px; color: #999;">없음</span>
                </div>
            </div>
        </div>
    </section>
</div>
