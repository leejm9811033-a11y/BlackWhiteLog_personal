<!--#### 식당 판넬 페이지 ajax 
~0311 : 상세 판넬(정보O,메뉴O-추후 이미지 추가,댓글X,예약X)

-->
<div id="restaurantDetailPanel" class="detail-panel hidden">
<div class="detail-header">
    <button id="closeDetailBtn" class="back-btn">← 뒤로</button>
    <img id="detailMainImage" src="" alt="가게 이미지" class="detail-main-img" />
    <h2 id="detailRestaurantName" class="detail-title">가게 이름</h2>
</div>

<nav class="detail-nav">
    <button class="tab-btn active" data-tab="info">정보</button>
    <button class="tab-btn" data-tab="menu">메뉴</button>
    <button class="tab-btn" data-tab="reviews">댓글</button>
    <button class="tab-btn" data-tab="reservation">예약</button>
</nav>

<div class="detail-content">
    <div id="tab-info" class="tab-pane active">
        <p>가게 정보를 불러오는 중...</p>
    </div>

    <div id="tab-menu" class="tab-pane hidden">
        <p>메뉴 정보를 불러오는 중...</p>
    </div>

    <div id="tab-reviews" class="tab-pane hidden">
        
    <div class="review-write-form" style="text-align: center;">
    <div style="font-weight: bold; margin-bottom: 10px; color: var(--subtext);">이 식당을 평가해주세요!</div>
    
    <div class="star-input-wrap" id="starInputWrap" data-current-rating="0">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
        <input type="hidden" id="reviewRating" value="0">
    </div>
    
    <div id="reviewInputArea" class="hidden" style="text-align: left; margin-top: 15px;">
        <div id="imagePreviewContainer" class="hidden">
            <div id="previewSlider" class="preview-slider">
                </div>
        </div>

        <textarea id="reviewContent" placeholder="이 식당에서의 경험을 솔직하게 나누어 주세요!"></textarea>
        
        <div class="review-form-actions">
            <label for="reviewImage" class="btn-attach">첨부</label>
            <input type="file" id="reviewImage" accept="image/*" multiple style="display: none;">
            <button id="submitReviewBtn" class="btn-submit">리뷰 등록</button>
        </div>
    </div>
    </div>

        <div id="reviewListContainer"></div>
    </div>

    <div id="tab-reservation" class="tab-pane hidden">
        <p>예약 기능은 준비 중입니다.</p>
    </div>
</div>
</div>
<!--#### 추천 식당클릭 넘어가기 -->
