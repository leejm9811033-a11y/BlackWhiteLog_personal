<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 리뷰 보기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage.css') }}">
</head>
<body>
    <div class="mypage-detail-page">
        <div class="mypage-detail-container">
            <div class="mypage-detail-header">
                <div>
                    <h1>내 리뷰 보기</h1>
                    <p>{{ user_nickname }}님의 리뷰 목록입니다.</p>
                </div>
                <a href="{{ url_for('mypage.mypage') }}" class="mypage-back-btn">마이페이지로</a>
            </div>

            <div class="mypage-detail-list">
                {% if reviews %}
                    {% for review in reviews %}
                        <div class="mypage-detail-card">
                            <div class="mypage-detail-top">
                                <strong>{{ review.restaurant_name }}</strong>
                                <span>⭐ {{ review.rating }}</span>
                            </div>
                            <p>{{ review.content }}</p>
                            <div class="mypage-detail-meta">
                                <span>{{ review.created_at }}</span>
                                <span>{{ review.status }}</span>
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="mypage-empty">작성한 리뷰가 없습니다.</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
