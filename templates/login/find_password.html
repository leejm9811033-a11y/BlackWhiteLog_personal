<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/find_account.css') }}">
</head>
<body>
    <div class="find-page">
        <div class="find-card">
            <h1>비밀번호 재설정</h1>
            <p class="find-desc">
                가입한 이메일로 인증번호를 받고<br>
                인증 완료 후 새 비밀번호를 설정해주세요.
            </p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash-message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="find-form" id="passwordResetForm" onsubmit="return false;">
                <label for="email">이메일</label>
                <div class="input-row">
                    <input type="email" id="email" name="email" placeholder="이메일 입력" required>
                    <button type="button" class="find-btn side-btn" id="sendCodeBtn">인증번호 전송</button>
                </div>
                <div id="sendMessage" class="inline-message"></div>

                <label for="verify_code">인증번호</label>
                <div class="input-row">
                    <div class="code-input-wrap">
                        <input type="text" id="verify_code" name="verify_code" placeholder="인증번호 6자리 입력" maxlength="6" required>
                        <span id="timerText" class="timer-text">03:00</span>
                    </div>
                    <button type="button" class="find-btn side-btn sub-btn" id="verifyCodeBtn">인증하기</button>
                </div>
                <div id="verifyMessage" class="inline-message"></div>

                <div id="passwordSection" class="password-section hidden">
                    <label for="new_password">새 비밀번호</label>
                    <input type="password" id="new_password" name="new_password" placeholder="새 비밀번호 입력" required>

                    <label for="new_password_confirm">새 비밀번호 확인</label>
                    <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="새 비밀번호 다시 입력" required>

                    <div id="changeMessage" class="inline-message"></div>

                    <button type="button" class="find-btn full-btn" id="changePasswordBtn">비밀번호 변경</button>
                </div>
            </form>

            <div class="bottom-links">
                <a href="{{ url_for('login.find_id') }}">이메일 찾기</a>
                <a href="{{ url_for('login.login') }}">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById("email");
        const verifyCodeInput = document.getElementById("verify_code");
        const newPasswordInput = document.getElementById("new_password");
        const newPasswordConfirmInput = document.getElementById("new_password_confirm");

        const sendCodeBtn = document.getElementById("sendCodeBtn");
        const verifyCodeBtn = document.getElementById("verifyCodeBtn");
        const changePasswordBtn = document.getElementById("changePasswordBtn");

        const sendMessage = document.getElementById("sendMessage");
        const verifyMessage = document.getElementById("verifyMessage");
        const changeMessage = document.getElementById("changeMessage");

        const passwordSection = document.getElementById("passwordSection");
        const timerText = document.getElementById("timerText");

        let timerInterval = null;
        let expireAt = null;
        let isVerified = false;

        function setMessage(target, text, type = "info") {
            target.textContent = text;
            target.className = `inline-message ${type}`;
        }

        function clearMessage(target) {
            target.textContent = "";
            target.className = "inline-message";
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function formatTime(seconds) {
            const min = String(Math.floor(seconds / 60)).padStart(2, "0");
            const sec = String(seconds % 60).padStart(2, "0");
            return `${min}:${sec}`;
        }

        function startTimer(serverExpireAt) {
            stopTimer();
            expireAt = serverExpireAt;

            function updateTimer() {
                const now = Math.floor(Date.now() / 1000);
                const remain = expireAt - now;

                if (remain <= 0) {
                    timerText.textContent = "00:00";
                    stopTimer();
                    isVerified = false;
                    passwordSection.classList.add("hidden");
                    setMessage(verifyMessage, "인증시간이 만료되었습니다. 인증번호를 다시 전송해주세요.", "error");
                    return;
                }

                timerText.textContent = formatTime(remain);
            }

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        sendCodeBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();

            clearMessage(sendMessage);
            clearMessage(verifyMessage);
            clearMessage(changeMessage);

            passwordSection.classList.add("hidden");
            isVerified = false;

            if (!email) {
                setMessage(sendMessage, "이메일을 입력해주세요.", "error");
                emailInput.focus();
                return;
            }

            try {
                const response = await fetch("/password-reset/send-code", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    setMessage(sendMessage, result.message || "인증번호 전송에 실패했습니다.", "error");
                    return;
                }

                setMessage(sendMessage, result.message, "success");
                startTimer(result.expire_at);
            } catch (error) {
                setMessage(sendMessage, "서버 통신 중 오류가 발생했습니다.", "error");
            }
        });

        verifyCodeBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const code = verifyCodeInput.value.trim();

            clearMessage(verifyMessage);
            clearMessage(changeMessage);

            if (!email) {
                setMessage(verifyMessage, "이메일을 먼저 입력해주세요.", "error");
                emailInput.focus();
                return;
            }

            if (!code) {
                setMessage(verifyMessage, "인증번호를 입력해주세요.", "error");
                verifyCodeInput.focus();
                return;
            }

            try {
                const response = await fetch("/password-reset/verify-code", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, code })
                });

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    isVerified = false;
                    passwordSection.classList.add("hidden");
                    setMessage(verifyMessage, result.message || "인증에 실패했습니다.", "error");
                    return;
                }

                isVerified = true;
                setMessage(verifyMessage, result.message, "success");
                passwordSection.classList.remove("hidden");
            } catch (error) {
                setMessage(verifyMessage, "서버 통신 중 오류가 발생했습니다.", "error");
            }
        });

        changePasswordBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const new_password = newPasswordInput.value.trim();
            const new_password_confirm = newPasswordConfirmInput.value.trim();

            clearMessage(changeMessage);

            if (!isVerified) {
                setMessage(changeMessage, "먼저 인증번호 확인을 완료해주세요.", "error");
                return;
            }

            if (!new_password || !new_password_confirm) {
                setMessage(changeMessage, "새 비밀번호와 비밀번호 확인을 입력해주세요.", "error");
                return;
            }

            try {
                const response = await fetch("/password-reset/change", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        new_password,
                        new_password_confirm
                    })
                });

                const result = await response.json();

                if (!response.ok || !result.ok) {
                    setMessage(changeMessage, result.message || "비밀번호 변경에 실패했습니다.", "error");
                    return;
                }

                setMessage(changeMessage, result.message, "success");

                setTimeout(() => {
                    window.location.href = "{{ url_for('login.login') }}";
                }, 1500);
            } catch (error) {
                setMessage(changeMessage, "서버 통신 중 오류가 발생했습니다.", "error");
            }
        });
    </script>
</body>
</html>
